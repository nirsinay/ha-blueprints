blueprint:
  name: Smart Roller Shade with AC & Window Control V1.1
  description: Multi-condition automation for roller shades with weekday/weekend scheduling, window-based open/close, AC cooling response, temperature/humidity control, and evening close. Manual adjustments block automation until 10 PM reset.
  domain: automation
  author: Nir's Home Assistant Setup
  source_url: https://github.com/nirsinay/ha-blueprints/blob/main/automation/smart_roller_shade_automation.yaml
  homeassistant:
    min_version: "2024.10.0"
  input:
    devices:
      name: Devices
      icon: mdi:blinds
      input:
        roller_shade:
          name: Roller shade
          description: The cover/blind to control
          selector:
            entity:
              domain: cover
        left_window_sensor:
          name: Left window sensor
          description: Left window open/close binary sensor
          selector:
            entity:
              domain: binary_sensor
        right_window_sensor:
          name: Right window sensor
          description: Right window open/close binary sensor
          selector:
            entity:
              domain: binary_sensor
        climate_entity:
          name: Climate entity (AC/Thermostat)
          description: The air conditioner or climate control for this room
          selector:
            entity:
              domain: climate
        temperature_sensor:
          name: Temperature sensor (feels-like)
          description: Temperature sensor to trigger cooling response
          selector:
            entity:
              domain: sensor
              device_class: temperature
        humidity_sensor:
          name: Humidity sensor
          description: Humidity sensor to trigger shade close for moisture control
          selector:
            entity:
              domain: sensor
              device_class: humidity
    scheduling:
      name: Scheduling
      icon: mdi:calendar-clock
      input:
        weekday_open_time:
          name: Weekday open time
          description: Time to open shade on weekday mornings
          default: "07:00:00"
          selector:
            time:
        weekend_open_time:
          name: Weekend open time
          description: Time to open shade on weekend mornings
          default: "09:00:00"
          selector:
            time:
        evening_close_time:
          name: Evening close time
          description: Time to close shade in the evening
          default: "21:00:00"
          selector:
            time:
        reset_manual_override_time:
        quiet_hours_start:
          name: Quiet hours start
          description: Time to start ignoring all automation triggers (e.g. 22:00 for 10 PM). Set same as end time to disable quiet hours.
          default: "22:00:00"
          selector:
            time:
        quiet_hours_end:
          name: Quiet hours end
          description: Time to resume automation (e.g. 07:00 for 7 AM). Automation will NOT run between start and end times.
          default: "07:00:00"
          selector:
            time:
          name: Reset manual override time
          description: Time to reset the manual override and allow automation to resume
          default: "22:00:00"
          selector:
            time:
    presence:
      name: Presence & Conditions
      icon: mdi:home-account
      input:
        person_entity:
          name: Person entity
          description: Track this person's presence for automation logic
          selector:
            entity:
              domain: person
        shade_state_helper:
          name: Shade State Helper
          description: "Create an input_text helper to track the last automation action.\n\n**SETUP INSTRUCTIONS:**\n1. Go to Settings → Devices & Services → Helpers\n2. Click Create Helper → Text\n3. Name it: 'Living Room Shade State' (or your room name)\n4. Set Max Character: 100\n5. Click Create\n6. Return here and select the newly created helper\n\n**HOW IT WORKS:**\n• Helper stores what the automation last set (open, closed, moving, etc.)\n• When you manually adjust the shade, it won't match the helper state\n• Automation detects mismatch and blocks until 10 PM\n• At 10 PM, helper resets to allow automation again"
          selector:
            entity:
              domain: input_text
        notification_service:
          name: Notification service
          description: Service to send window-open notifications
          selector:
            text:
          default: "notify.nir_s_iphone_15"
    thresholds:
      name: Thresholds & Positions
      icon: mdi:thermometer-high
      collapsed: true
      input:
        temp_high_threshold:
          name: High temperature threshold
          default: 30
          selector:
            number: 
              min: 15
              max: 50
              unit_of_measurement: "°C"
              mode: slider
        temp_normal_threshold:
          name: Normal temperature threshold
          default: 26
          selector:
            number: 
              min: 15
              max: 40
              unit_of_measurement: "°C"
              mode: slider
        humidity_high_threshold:
          name: High humidity threshold
          default: 70
          selector:
            number: 
              min: 30
              max: 100
              unit_of_measurement: "%"
              mode: slider
        drive_time_seconds:
          name: Drive time
          description: Time (seconds) for the shade to physically finish moving. Keeps the automation from mistaking its own movement for a manual adjustment. Round up rather than be too precise — better too long than too short.
          default: 90
          selector:
            number:
              min: 5
              max: 180
              unit_of_measurement: seconds
              mode: slider
        weekday_open_position:
          name: Weekday open position
          default: 75
          selector:
            number: 
              min: 0
              max: 100
              unit_of_measurement: "%"
              mode: slider
        window_open_position:
          name: Window open position
          default: 100
          selector:
            number: 
              min: 0
              max: 100
              unit_of_measurement: "%"
              mode: slider
        away_position:
          name: Away position
          default: 25
          selector:
            number: 
              min: 0
              max: 100
              unit_of_measurement: "%"
              mode: slider
        away_night_position:
          name: Away night position
          default: 0
          selector:
            number: 
              min: 0
              max: 100
              unit_of_measurement: "%"
              mode: slider
        cooling_position:
          name: Cooling position
          default: 25
          selector:
            number: 
              min: 0
              max: 100
              unit_of_measurement: "%"
              mode: slider
        full_close_position:
          name: Full close position
          default: 100
          selector:
            number: 
              min: 0
              max: 100
              unit_of_measurement: "%"
              mode: slider

mode: queued
max: 10

triggers:
  - trigger: sun
    event: sunrise
    id: weekday_morning
  - trigger: time
    at: !input weekend_open_time
    id: weekend_morning
  - trigger: time
    at: !input evening_close_time
    id: evening_close
  - trigger: time
    at: !input reset_manual_override_time
    id: reset_manual_override
  - trigger: state
    entity_id:
      - !input left_window_sensor
      - !input right_window_sensor
    to: "on"
    id: window_opened
  - trigger: state
    entity_id:
      - !input left_window_sensor
      - !input right_window_sensor
    to: "off"
    id: window_closed
  - trigger: state
    entity_id: !input person_entity
    to: "not_home"
    id: person_left_home
  - trigger: state
    entity_id: !input person_entity
    to: "home"
    id: person_arrived_home
  - trigger: numeric_state
    entity_id: !input temperature_sensor
    above: !input temp_high_threshold
    id: temp_high
  - trigger: numeric_state
    entity_id: !input temperature_sensor
    below: !input temp_normal_threshold
    id: temp_normal
  - trigger: numeric_state
    entity_id: !input humidity_sensor
    above: !input humidity_high_threshold
    id: humidity_high
  - trigger: state
    entity_id: !input climate_entity
    id: ac_mode_change
  - trigger: state
    entity_id: !input roller_shade
    id: cover_position_changed

conditions:
  # Skip automation DURING quiet hours (e.g. 10 PM to 7 AM) - use NOT to invert the logic
  - condition: not
    conditions:
      - condition: time
        after: !input quiet_hours_start
        before: !input quiet_hours_end

actions:
  - choose:
      # Reset at 10 PM - always runs
      - conditions:
          - condition: trigger
            id: reset_manual_override
        sequence:
          - action: input_text.set_value
            target:
              entity_id: !input shade_state_helper
            data:
              value: "reset"

      # Weekday morning open
      - conditions:
          - condition: trigger
            id: weekday_morning
          - condition: time
            weekday: ["mon", "tue", "wed", "thu", "fri"]
          - condition: state
            entity_id: !input person_entity
            state: "home"
          - condition: or
            conditions:
              - condition: state
                entity_id: !input shade_state_helper
                state: ""
              - condition: state
                entity_id: !input shade_state_helper
                state: "reset"
        sequence:
          - action: input_text.set_value
            target:
              entity_id: !input shade_state_helper
            data:
              value: "moving"
          - action: cover.set_cover_position
            target:
              entity_id: !input roller_shade
            data:
              position: !input weekday_open_position
          - delay:
              seconds: "{{ (drive_time_seconds | int(90)) }}"
          - action: input_text.set_value
            target:
              entity_id: !input shade_state_helper
            data:
              value: "open"

      # Weekend morning open
      - conditions:
          - condition: trigger
            id: weekend_morning
          - condition: time
            weekday: ["sat", "sun"]
          - condition: state
            entity_id: !input person_entity
            state: "home"
          - condition: or
            conditions:
              - condition: state
                entity_id: !input shade_state_helper
                state: ""
              - condition: state
                entity_id: !input shade_state_helper
                state: "reset"
        sequence:
          - action: input_text.set_value
            target:
              entity_id: !input shade_state_helper
            data:
              value: "moving"
          - action: cover.set_cover_position
            target:
              entity_id: !input roller_shade
            data:
              position: !input weekday_open_position
          - delay:
              seconds: "{{ (drive_time_seconds | int(90)) }}"
          - action: input_text.set_value
            target:
              entity_id: !input shade_state_helper
            data:
              value: "open"

      # Window opened during day
      - conditions:
          - condition: trigger
            id: window_opened
          - condition: time
            after: "07:00:00"
            before: "18:00:00"
          - condition: or
            conditions:
              - condition: state
                entity_id: !input shade_state_helper
                state: ""
              - condition: state
                entity_id: !input shade_state_helper
                state: "reset"
        sequence:
          - delay: "00:00:05"
          - action: input_text.set_value
            target:
              entity_id: !input shade_state_helper
            data:
              value: "moving"
          - action: cover.set_cover_position
            target:
              entity_id: !input roller_shade
            data:
              position: !input window_open_position
          - delay:
              seconds: "{{ (drive_time_seconds | int(90)) }}"
          - action: input_text.set_value
            target:
              entity_id: !input shade_state_helper
            data:
              value: "window_open"

      # Windows closed during day - return to normal
      - conditions:
          - condition: trigger
            id: window_closed
          - condition: time
            after: "07:00:00"
            before: "18:00:00"
          - condition: and
            conditions:
              - condition: state
                entity_id: !input left_window_sensor
                state: "off"
              - condition: state
                entity_id: !input right_window_sensor
                state: "off"
          - condition: or
            conditions:
              - condition: state
                entity_id: !input shade_state_helper
                state: ""
              - condition: state
                entity_id: !input shade_state_helper
                state: "reset"
        sequence:
          - delay: "00:00:10"
          - action: input_text.set_value
            target:
              entity_id: !input shade_state_helper
            data:
              value: "moving"
          - action: cover.set_cover_position
            target:
              entity_id: !input roller_shade
            data:
              position: !input weekday_open_position
          - delay:
              seconds: "{{ (drive_time_seconds | int(90)) }}"
          - action: input_text.set_value
            target:
              entity_id: !input shade_state_helper
            data:
              value: "open"

      # Windows closed after sunset
      - conditions:
          - condition: trigger
            id: window_closed
          - condition: time
            after: "18:00:00"
            before: "07:00:00"
          - condition: and
            conditions:
              - condition: state
                entity_id: !input left_window_sensor
                state: "off"
              - condition: state
                entity_id: !input right_window_sensor
                state: "off"
          - condition: or
            conditions:
              - condition: state
                entity_id: !input shade_state_helper
                state: ""
              - condition: state
                entity_id: !input shade_state_helper
                state: "reset"
        sequence:
          - delay: "00:00:10"
          - action: input_text.set_value
            target:
              entity_id: !input shade_state_helper
            data:
              value: "moving"
          - action: cover.set_cover_position
            target:
              entity_id: !input roller_shade
            data:
              position: !input full_close_position
          - delay:
              seconds: "{{ (drive_time_seconds | int(90)) }}"
          - action: input_text.set_value
            target:
              entity_id: !input shade_state_helper
            data:
              value: "closed"

      # Evening close - windows closed
      - conditions:
          - condition: trigger
            id: evening_close
          - condition: and
            conditions:
              - condition: state
                entity_id: !input left_window_sensor
                state: "off"
              - condition: state
                entity_id: !input right_window_sensor
                state: "off"
          - condition: or
            conditions:
              - condition: state
                entity_id: !input shade_state_helper
                state: ""
              - condition: state
                entity_id: !input shade_state_helper
                state: "reset"
        sequence:
          - action: input_text.set_value
            target:
              entity_id: !input shade_state_helper
            data:
              value: "moving"
          - action: cover.set_cover_position
            target:
              entity_id: !input roller_shade
            data:
              position: !input full_close_position
          - delay:
              seconds: "{{ (drive_time_seconds | int(90)) }}"
          - action: input_text.set_value
            target:
              entity_id: !input shade_state_helper
            data:
              value: "closed"

      # Evening close - windows open (notification)
      - conditions:
          - condition: trigger
            id: evening_close
          - condition: or
            conditions:
              - condition: state
                entity_id: !input left_window_sensor
                state: "on"
              - condition: state
                entity_id: !input right_window_sensor
                state: "on"
        sequence:
          - action: !input notification_service
            data:
              title: "Shade - Windows Open"
              message: "Windows are open at {{ now().strftime('%H:%M') }}. Please close them."

      # Person left home - partial close
      - conditions:
          - condition: trigger
            id: person_left_home
          - condition: sun
            before: sunset
          - condition: or
            conditions:
              - condition: state
                entity_id: !input shade_state_helper
                state: ""
              - condition: state
                entity_id: !input shade_state_helper
                state: "reset"
        sequence:
          - action: input_text.set_value
            target:
              entity_id: !input shade_state_helper
            data:
              value: "moving"
          - action: cover.set_cover_position
            target:
              entity_id: !input roller_shade
            data:
              position: !input away_position
          - delay:
              seconds: "{{ (drive_time_seconds | int(90)) }}"
          - action: input_text.set_value
            target:
              entity_id: !input shade_state_helper
            data:
              value: "away"

      # Person left home after sunset
      - conditions:
          - condition: trigger
            id: person_left_home
          - condition: sun
            after: sunset
          - condition: or
            conditions:
              - condition: state
                entity_id: !input shade_state_helper
                state: ""
              - condition: state
                entity_id: !input shade_state_helper
                state: "reset"
        sequence:
          - action: input_text.set_value
            target:
              entity_id: !input shade_state_helper
            data:
              value: "moving"
          - action: cover.set_cover_position
            target:
              entity_id: !input roller_shade
            data:
              position: !input away_night_position
          - delay:
              seconds: "{{ (drive_time_seconds | int(90)) }}"
          - action: input_text.set_value
            target:
              entity_id: !input shade_state_helper
            data:
              value: "away_night"

      # Person arrived home
      - conditions:
          - condition: trigger
            id: person_arrived_home
          - condition: or
            conditions:
              - condition: state
                entity_id: !input shade_state_helper
                state: ""
              - condition: state
                entity_id: !input shade_state_helper
                state: "reset"
        sequence:
          - action: input_text.set_value
            target:
              entity_id: !input shade_state_helper
            data:
              value: "moving"
          - action: cover.set_cover_position
            target:
              entity_id: !input roller_shade
            data:
              position: !input weekday_open_position
          - delay:
              seconds: "{{ (drive_time_seconds | int(90)) }}"
          - action: input_text.set_value
            target:
              entity_id: !input shade_state_helper
            data:
              value: "open"

      # High temperature - full close
      - conditions:
          - condition: trigger
            id: temp_high
          - condition: and
            conditions:
              - condition: state
                entity_id: !input left_window_sensor
                state: "off"
              - condition: state
                entity_id: !input right_window_sensor
                state: "off"
          - condition: or
            conditions:
              - condition: state
                entity_id: !input shade_state_helper
                state: ""
              - condition: state
                entity_id: !input shade_state_helper
                state: "reset"
        sequence:
          - action: input_text.set_value
            target:
              entity_id: !input shade_state_helper
            data:
              value: "moving"
          - action: cover.set_cover_position
            target:
              entity_id: !input roller_shade
            data:
              position: 0
          - delay:
              seconds: "{{ (drive_time_seconds | int(90)) }}"
          - action: input_text.set_value
            target:
              entity_id: !input shade_state_helper
            data:
              value: "cooling"

      # Temperature back to normal
      - conditions:
          - condition: trigger
            id: temp_normal
          - condition: and
            conditions:
              - condition: state
                entity_id: !input left_window_sensor
                state: "off"
              - condition: state
                entity_id: !input right_window_sensor
                state: "off"
          - condition: or
            conditions:
              - condition: state
                entity_id: !input shade_state_helper
                state: ""
              - condition: state
                entity_id: !input shade_state_helper
                state: "reset"
        sequence:
          - action: input_text.set_value
            target:
              entity_id: !input shade_state_helper
            data:
              value: "moving"
          - action: cover.set_cover_position
            target:
              entity_id: !input roller_shade
            data:
              position: !input weekday_open_position
          - delay:
              seconds: "{{ (drive_time_seconds | int(90)) }}"
          - action: input_text.set_value
            target:
              entity_id: !input shade_state_helper
            data:
              value: "open"

      # High humidity - close
      - conditions:
          - condition: trigger
            id: humidity_high
          - condition: and
            conditions:
              - condition: state
                entity_id: !input left_window_sensor
                state: "off"
              - condition: state
                entity_id: !input right_window_sensor
                state: "off"
          - condition: or
            conditions:
              - condition: state
                entity_id: !input shade_state_helper
                state: ""
              - condition: state
                entity_id: !input shade_state_helper
                state: "reset"
        sequence:
          - action: input_text.set_value
            target:
              entity_id: !input shade_state_helper
            data:
              value: "moving"
          - action: cover.set_cover_position
            target:
              entity_id: !input roller_shade
            data:
              position: 0
          - delay:
              seconds: "{{ (drive_time_seconds | int(90)) }}"
          - action: input_text.set_value
            target:
              entity_id: !input shade_state_helper
            data:
              value: "humidity_control"

      # AC mode changed to anything other than OFF
      - conditions:
          - condition: trigger
            id: ac_mode_change
          - condition: not
            conditions:
              - condition: state
                entity_id: !input climate_entity
                state: "off"
          - condition: and
            conditions:
              - condition: state
                entity_id: !input left_window_sensor
                state: "off"
              - condition: state
                entity_id: !input right_window_sensor
                state: "off"
          - condition: or
            conditions:
              - condition: state
                entity_id: !input shade_state_helper
                state: ""
              - condition: state
                entity_id: !input shade_state_helper
                state: "reset"
              - condition: state
                entity_id: !input roller_shade
                state: "closed"
          - condition: not
            conditions:
        sequence:
          - action: input_text.set_value
            target:
              entity_id: !input shade_state_helper
            data:
              value: "moving"
          - action: cover.set_cover_position
            target:
              entity_id: !input roller_shade
            data:
              position: !input cooling_position
          - delay:
              seconds: "{{ (drive_time_seconds | int(90)) }}"
          - action: input_text.set_value
            target:
              entity_id: !input shade_state_helper
            data:
              value: "ac_cooling"

      # Manual adjustment detected - any cover change while helper isn't "moving"
      # (i.e. not a change the automation itself is currently making) is treated
      # as manual and blocks automation until the reset time.
      - conditions:
          - condition: trigger
            id: cover_position_changed
          - condition: not
            conditions:
              - condition: state
                entity_id: !input shade_state_helper
                state: "moving"
              - condition: state
                entity_id: !input shade_state_helper
                state: "manual_override"
        sequence:
          - action: input_text.set_value
            target:
              entity_id: !input shade_state_helper
            data:
              value: "manual_override"