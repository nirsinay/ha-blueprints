blueprint:
  name: Smart Roller Shade with AC & Window Control
  description: Multi-condition automation for roller shades with weekday/weekend scheduling, window-based open/close, AC cooling response, temperature/humidity control, and evening close. Tracks manual overrides and sends notifications.
  domain: automation
  author: Nir's Home Assistant Setup
  source_url: https://github.com/yourusername/ha-blueprints/blob/main/smart_roller_shade_automation.yaml
  homeassistant:
    min_version: "2024.10.0"
  input:
    devices:
      name: Devices
      icon: mdi:blinds
      input:
        roller_shade:
          name: Roller shade
          description: The cover/blind to control
          selector:
            entity:
              domain: cover
        window_sensors:
          name: Window sensors
          description: Window open/close binary sensors for this room
          selector:
            entity:
              domain: binary_sensor
              device_class: window
          multiple: true
        climate_entity:
          name: Climate entity (AC/Thermostat)
          description: The air conditioner or climate control for this room
          selector:
            entity:
              domain: climate
        temperature_sensor:
          name: Temperature sensor (feels-like)
          description: Temperature sensor to trigger cooling response
          selector:
            entity:
              domain: sensor
              device_class: temperature
        humidity_sensor:
          name: Humidity sensor
          description: Humidity sensor to trigger shade close for moisture control
          selector:
            entity:
              domain: sensor
              device_class: humidity
    scheduling:
      name: Scheduling
      icon: mdi:calendar-clock
      input:
        weekday_open_time:
          name: Weekday open time
          description: Time to open shade on weekday mornings
          default: "07:00:00"
          selector:
            time:
        weekend_open_time:
          name: Weekend open time
          description: Time to open shade on weekend mornings
          default: "09:00:00"
          selector:
            time:
        evening_close_time:
          name: Evening close time
          description: Time to close shade in the evening
          default: "21:00:00"
          selector:
            time:
        reset_manual_override_time:
          name: Reset manual override time
          description: Time to reset the manual override flag each day
          default: "22:00:00"
          selector:
            time:
    presence:
      name: Presence & Conditions
      icon: mdi:home-account
      input:
        person_entity:
          name: Person entity
          description: Track this person's presence for automation logic
          selector:
            entity:
              domain: person
        manual_override_helper:
          name: Manual override helper
          description: Input boolean to track manual shade adjustments
          selector:
            entity:
              domain: input_boolean
        notification_service:
          name: Notification service
          description: Service to send window-open notifications (e.g., notify.phone_name)
          selector:
            text:
              multiline: false
          default: "notify.nir_s_iphone_15"
    thresholds:
      name: Thresholds & Positions
      icon: mdi:thermometer-high
      collapsed: true
      input:
        temp_high_threshold:
          name: High temperature threshold
          description: Temperature above which shade fully closes for cooling
          default: 30
          selector:
            number: { min: 15, max: 50, unit_of_measurement: "°C", mode: slider }
        temp_normal_threshold:
          name: Normal temperature threshold
          description: Temperature below which shade returns to normal position
          default: 26
          selector:
            number: { min: 15, max: 40, unit_of_measurement: "°C", mode: slider }
        humidity_high_threshold:
          name: High humidity threshold
          description: Humidity above which shade closes to reduce moisture
          default: 70
          selector:
            number: { min: 30, max: 100, unit_of_measurement: "%", mode: slider }
        weekday_open_position:
          name: Weekday open position
          description: Shade position (0-100) for normal weekday operation
          default: 75
          selector:
            number: { min: 0, max: 100, unit_of_measurement: "%", mode: slider }
        window_open_position:
          name: Window open position
          description: Shade position (0-100) when windows are open during day
          default: 100
          selector:
            number: { min: 0, max: 100, unit_of_measurement: "%", mode: slider }
        away_position:
          name: Away position
          description: Shade position (0-100) when person leaves home
          default: 25
          selector:
            number: { min: 0, max: 100, unit_of_measurement: "%", mode: slider }
        away_night_position:
          name: Away night position
          description: Shade position (0-100) when person leaves home after sunset
          default: 0
          selector:
            number: { min: 0, max: 100, unit_of_measurement: "%", mode: slider }
        cooling_position:
          name: Cooling position
          description: Shade position (0-100) when AC is active
          default: 25
          selector:
            number: { min: 0, max: 100, unit_of_measurement: "%", mode: slider }
        full_close_position:
          name: Full close position
          description: Shade position (0-100) for full night close
          default: 100
          selector:
            number: { min: 0, max: 100, unit_of_measurement: "%", mode: slider }

mode: queued
max: 10

variables:
  manual_override_helper: !input manual_override_helper
  window_sensors: !input window_sensors
  any_window_open: "{{ window_sensors | map(attribute='entity_id') | map(state_attr('state')) | select('eq', 'on') | list | length > 0 }}"
  all_windows_closed: "{{ window_sensors | map(attribute='entity_id') | map(state_attr('state')) | select('eq', 'off') | list | length == window_sensors | length }}"

triggers:
  # Daily scheduling
  - trigger: sun
    event: sunrise
    id: weekday_morning
  - trigger: time
    at: !input weekend_open_time
    id: weekend_morning
  - trigger: time
    at: !input evening_close_time
    id: evening_close
  - trigger: time
    at: !input reset_manual_override_time
    id: reset_manual_override

  # Window sensors
  - trigger: state
    entity_id: !input window_sensors
    to: "on"
    id: window_opened
  - trigger: state
    entity_id: !input window_sensors
    to: "off"
    id: window_closed

  # Presence
  - trigger: state
    entity_id: !input person_entity
    to: "not_home"
    id: person_left_home
  - trigger: state
    entity_id: !input person_entity
    to: "home"
    id: person_arrived_home

  # Temperature & Humidity
  - trigger: numeric_state
    entity_id: !input temperature_sensor
    above: !input temp_high_threshold
    id: temp_high
  - trigger: numeric_state
    entity_id: !input temperature_sensor
    below: !input temp_normal_threshold
    id: temp_normal
  - trigger: numeric_state
    entity_id: !input humidity_sensor
    above: !input humidity_high_threshold
    id: humidity_high

  # AC Mode Change
  - trigger: state
    entity_id: !input climate_entity
    id: ac_mode_change

  # Manual override tracking
  - trigger: state
    entity_id: !input roller_shade
    id: cover_position_changed

conditions: []

actions:
  - choose:
      # Weekday morning open
      - conditions:
          - condition: trigger
            id: weekday_morning
          - condition: time
            weekday: ["mon", "tue", "wed", "thu", "fri"]
          - condition: state
            entity_id: !input person_entity
            state: "home"
        sequence:
          - action: cover.set_cover_position
            target:
              entity_id: !input roller_shade
            data:
              position: !input weekday_open_position

      # Weekend morning open
      - conditions:
          - condition: trigger
            id: weekend_morning
          - condition: time
            weekday: ["sat", "sun"]
          - condition: state
            entity_id: !input person_entity
            state: "home"
        sequence:
          - action: cover.set_cover_position
            target:
              entity_id: !input roller_shade
            data:
              position: !input weekday_open_position

      # Window opened during day - fully open
      - conditions:
          - condition: trigger
            id: window_opened
          - condition: time
            after: "07:00:00"
            before: "18:00:00"
        sequence:
          - delay: "00:00:05"
          - action: cover.set_cover_position
            target:
              entity_id: !input roller_shade
            data:
              position: !input window_open_position

      # Windows closed during day - return to normal
      - conditions:
          - condition: trigger
            id: window_closed
          - condition: time
            after: "07:00:00"
            before: "18:00:00"
          - condition: or
            conditions:
              - condition: state
                entity_id: !input window_sensors
                state: "off"
        sequence:
          - delay: "00:00:10"
          - action: cover.set_cover_position
            target:
              entity_id: !input roller_shade
            data:
              position: !input weekday_open_position

      # Windows closed after sunset - close more
      - conditions:
          - condition: trigger
            id: window_closed
          - condition: time
            after: "18:00:00"
            before: "07:00:00"
          - condition: or
            conditions:
              - condition: state
                entity_id: !input window_sensors
                state: "off"
        sequence:
          - delay: "00:00:10"
          - action: cover.set_cover_position
            target:
              entity_id: !input roller_shade
            data:
              position: !input full_close_position

      # Evening close - windows closed
      - conditions:
          - condition: trigger
            id: evening_close
          - condition: or
            conditions:
              - condition: state
                entity_id: !input window_sensors
                state: "off"
        sequence:
          - action: cover.set_cover_position
            target:
              entity_id: !input roller_shade
            data:
              position: !input full_close_position

      # Evening close - windows open (notification)
      - conditions:
          - condition: trigger
            id: evening_close
          - condition: or
            conditions:
              - condition: state
                entity_id: !input window_sensors
                state: "on"
        sequence:
          - action: !input notification_service
            data:
              title: "{{ state_attr(config.variables.manual_override_helper, 'friendly_name') | default('Shade') }} Windows Open"
              message: "Windows are open at {{ now().strftime('%H:%M') }}. Please close them before the shade closes."

      # Person left home - partial close
      - conditions:
          - condition: trigger
            id: person_left_home
          - condition: sun
            before: sunset
        sequence:
          - action: cover.set_cover_position
            target:
              entity_id: !input roller_shade
            data:
              position: !input away_position

      # Person left home after sunset - full close
      - conditions:
          - condition: trigger
            id: person_left_home
          - condition: sun
            after: sunset
        sequence:
          - action: cover.set_cover_position
            target:
              entity_id: !input roller_shade
            data:
              position: !input away_night_position

      # Person arrived home
      - conditions:
          - condition: trigger
            id: person_arrived_home
        sequence:
          - action: cover.set_cover_position
            target:
              entity_id: !input roller_shade
            data:
              position: !input weekday_open_position

      # High temperature - full close for cooling
      - conditions:
          - condition: trigger
            id: temp_high
          - condition: or
            conditions:
              - condition: state
                entity_id: !input window_sensors
                state: "off"
        sequence:
          - action: cover.set_cover_position
            target:
              entity_id: !input roller_shade
            data:
              position: 0

      # Temperature back to normal
      - conditions:
          - condition: trigger
            id: temp_normal
          - condition: or
            conditions:
              - condition: state
                entity_id: !input window_sensors
                state: "off"
        sequence:
          - action: cover.set_cover_position
            target:
              entity_id: !input roller_shade
            data:
              position: !input weekday_open_position

      # High humidity - close for moisture control
      - conditions:
          - condition: trigger
            id: humidity_high
          - condition: or
            conditions:
              - condition: state
                entity_id: !input window_sensors
                state: "off"
        sequence:
          - action: cover.set_cover_position
            target:
              entity_id: !input roller_shade
            data:
              position: 0

      # AC mode changed to anything other than OFF - close partially unless windows open
      - conditions:
          - condition: trigger
            id: ac_mode_change
          - condition: not
            conditions:
              - condition: state
                entity_id: !input climate_entity
                state: "off"
          - condition: or
            conditions:
              - condition: state
                entity_id: !input window_sensors
                state: "off"
        sequence:
          - action: cover.set_cover_position
            target:
              entity_id: !input roller_shade
            data:
              position: !input cooling_position

      # Manual override tracking - shade position changed manually
      - conditions:
          - condition: trigger
            id: cover_position_changed
          - condition: state
            entity_id: !input manual_override_helper
            state: "off"
        sequence:
          - action: input_boolean.turn_on
            target:
              entity_id: !input manual_override_helper

      # Reset manual override at scheduled time
      - conditions:
          - condition: trigger
            id: reset_manual_override
        sequence:
          - action: input_boolean.turn_off
            target:
              entity_id: !input manual_override_helper
